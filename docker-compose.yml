services:
  postgres:
    image: postgres:17
    container_name: url-shortener-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: url-shortener-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: