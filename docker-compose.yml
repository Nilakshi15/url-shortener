version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: url-shortener-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: url-shortener-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: url-shortener-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/url_shortener
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BASE_URL: http://localhost:5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: url-shortener-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_started

    ports:
      - "5173:5173"

volumes:
  postgres_data: